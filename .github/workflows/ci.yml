name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  frontend:
    name: Frontend (build + lint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Fetch ZK circuits
        run: npm run circuits:fetch

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  contracts:
    name: Contracts (forge build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: avalanche-back
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: foundry-rs/foundry-toolchain@v1

      - name: Build
        run: forge build
